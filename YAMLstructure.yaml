# Config File strucutre 

app:
  name: zerox-app
  port: 3000

server:
  apiPrefix: /api/v1

database:
  provider: postgres
  url: ${DATABASE_URL}

models:
  User:
    table: users
    fields:
      id:
        type: uuid
        primary: true

      name:
        type: string
        required: true

      email:
        type: string
        required: true
        unique: true

      password:
        type: string
        required: true

      createdAt:
        type: date
        auto: true

    options:
      timestamps: true
      softDelete: false

  Product:
    fields:
      title:
        type: string
        required: true

      price:
        type: number
        required: true

      stock:
        type: number
        default: 0

features:
  crud:
    enabled: true
    pagination:
      enabled: true
      defaultLimit: 10

